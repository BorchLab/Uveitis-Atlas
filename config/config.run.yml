  # --- TCR motif / distance / generation (Viral vs NIU intraocular) ---
  gliph: false
  tcrdist: false
  olga: false
  viz_tcr_compare: false
  # --- Phase 3e: advanced TCR analyses (R/67-71 + R/77 viz) ---
  # Re-enabled 2026-05-22 for Figure 5 production. Most outputs already
  # exist on disk; re-running tcr_genex_signatures is the one expensive
  # step (UCell + DESeq2 over ~70k T cells). viz_tcr_advanced + R/79 are
  # cheap and idempotent so they stay on for figure iteration.
  gliph_tcrdist: false             # GLIPH x tcrdist concordance (outputs exist)
  gliph_network: false             # dual-graph network metrics (outputs exist)
  vdjdb: false                      # rerun 2026-05-22 after fuzzy_match: false flip
  tcr_genex_signatures: false       # rerun to pick up new type_17 panel
  gliph_motif_overlap: false       # OLC assembly (returns empty for this cohort;
                                   #   Panel H uses the motif_overlap_edges
                                   #   fallback wired into R/77)
  viz_tcr_advanced: true           # render all R/77 panels (Figure 5)
  tcr_sharpened_bridge: false       # R/79: Panel K GLIPH-restricted PC1 bridge
  novel_tcr_discovery: false        # R/80: score every GLIPH motif as a novel
                                   #   autoimmune-pathogenic TCR candidate

# =============================================================================
# Phase 1d — Figure 4 cross-compartment configuration (compartment PCA,
# cross-compartment PC1 bridge, LIANA cell-cell communication, NicheNet
# ligand activity, plus cross-compartment viz). Each module is gated by its
# own cfg$steps$* flag so they can be run individually.
# =============================================================================

compartment_pca:
  # Floor for per-(subject, substate) pseudobulk inclusion. Asymmetric:
  # myeloid is sparser (~26 subjects, 14 NIU / 12 Viral) so it gets a
  # lower floor than T / B cell. See planning doc 2026-05-19 audit.
  min_cells_per_subject_substate_myeloid: 20
  min_cells_per_subject_substate_tcell:   30
  # Dropped from 30 -> 10 (2026-05-27) to rescue cluster 2 Cycling plasmablast
  # in the PC1/PC2 panel. NIU still has 3 pbs at this floor; t-test on n=3 vs
  # n=7 is underpowered (flagged "(underpowered)" in F4_D-style panels) but
  # the point cloud is visible. Clusters 3/4 stay dropped (0 NIU pbs at any
  # floor) and the bridge correlations for those substates remain unavailable.
  min_cells_per_subject_substate_bcell:   10
  min_gene_count: 10
  vst_blind: false                  # match F3 inline convention (blind=FALSE)
  hvg_n: 2000
  n_pcs: 5
  pc1_split_fdr: 0.05               # Welch t on PC1_oriented across Phenotype_2

cross_compartment_bridge:
  weight_by_cluster_size: true
  also_save_unweighted: true
  strata: ["pooled", "etiology"]
  n_bootstrap: 2000
  n_permutation: 1000

liana:
  methods: ["natmi", "connectome", "logfc", "sca", "cellphonedb"]
  resource: "Consensus"
  min_cells_per_cluster: 10
  conditions: ["NIU", "Viral"]
  source_regex: "^myeloid_"
  target_regex: "^tcell_"
