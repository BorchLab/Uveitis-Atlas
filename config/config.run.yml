# LIANA — B cell-centered. Mirrors `liana:` (myeloid->tcell) but iterates
# four directions and uses bcell_programs for family annotation on the B
# side. Outputs land under outputs/tables/cross_compartment/ with file stems
# liana_<source>_to_<target>_{NIU,Viral}.csv plus per-direction combined.
liana_bcell:
  methods: ["natmi","connectome","logfc","sca","cellphonedb"]
  resource: "Consensus"
  min_cells_per_cluster: 10
  conditions: ["NIU","Viral"]
  top_n_for_dotplot: 25
  directions:
    - {name: "myeloid_to_bcell", source_compartments: ["myeloid"], target_compartments: ["bcell"], source_regex: "^myeloid_", target_regex: "^bcell_"}
    - {name: "tcell_to_bcell",   source_compartments: ["tcell"],   target_compartments: ["bcell"], source_regex: "^tcell_",   target_regex: "^bcell_"}
    - {name: "bcell_to_tcell",   source_compartments: ["bcell"],   target_compartments: ["tcell"], source_regex: "^bcell_",   target_regex: "^tcell_"}
    - {name: "bcell_to_myeloid", source_compartments: ["bcell"],   target_compartments: ["myeloid"], source_regex: "^bcell_", target_regex: "^myeloid_"}

# Cross-subject fuzzy IGH "public" clones. Bucket on V gene + J gene +
# CDR3-aa length, then single-link cluster within bucket by Hamming distance
# threshold = floor(max_hamming_pct * L). Etiology-stratified by default.
bcr_public:
  enable: true
  max_hamming_pct: 0.10
  v_match: "gene"            # strip allele suffix
  j_match: "gene"
  min_cdr3_length: 10        # suppress short-junction convergent FPs
  require_same_etiology: true
  also_run_cross_etiology: true
  min_subjects_per_cluster: 2
  perm_null_iters: 100

