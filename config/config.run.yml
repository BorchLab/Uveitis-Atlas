  bcell_lineage_architecture: false
  bcell_baseline_selection: false  # gated; flip when shazam is installed
  bcell_architecture_viz: true
  visualize: true
  # NB: Ibex / Trex / encoder-benchmark / ibex_phylogeny / trex_neighborhood /
  # ibex_clone_size_feasibility / ibex_external_validation steps were removed
  # 2026-06-03; the embedding analyses are not in the publication.
  eye_subset: false             # OFF to preserve outputs/objects/eye/IntegratedSeuratObject.rds
  eye_reintegrate: false        # OFF to preserve the eye sub-atlas. Flip both back to
                                # true only when intentionally rebuilding F2.
  eye_annotate: false
  eye_markers: false
  eye_dge: false
  eye_milo: false
  eye_composition: false
  eye_visualize: true
  # Tier 0 read-only diagnostics — flip on individually as you work
  # through the audit decisions, then turn back off for routine reruns.
  lens_ucell_diagnostic: false        # → lens_ucell_filter$threshold
  ctaa_filter_diagnostic: false       # → myeloid_ctaa_filter choice
  clone_definition_sensitivity: false # → repertoire$clone_definition
  lineage_validation: false           # → eye_manual_overrides
  pseudobulk_N_audit: false           # → underpowered substate review
  compartment_subset: false
  compartment_markers: false
  compartment_dge: false
  compartment_escape: false
  compartment_custom_modules: false   # curated UCell modules per compartment (panel F)
  compartment_composition: false
  compartment_milo: false
  compartment_visualize: true
  # Cross-compartment LR signalling (panels G of F3/F4/F5). joint_substate is
  # cheap and still drives downstream multi-compartment viz; LIANA replaces
  # the prior CellChat module (retired 2026-05-19, see R/47).
  joint_substate: false
  # --- Phase 1d (Figure 4 cross-compartment + bridge + LIANA) ---
